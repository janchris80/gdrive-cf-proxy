<!doctype html>
<html><head><meta charset="utf-8"><title>CDN Usage</title>
<style>body{font-family:system-ui,sans-serif;max-width:900px;margin:40px auto;padding:0 20px}
img,video{max-width:100%;border:1px solid #ddd;border-radius:8px;margin:10px 0}
code{background:#f4f4f4;padding:2px 6px;border-radius:4px}</style></head>
<body>
<h1>CDN — usage demo</h1>
<p>Replace <code>CDN</code> with your Worker URL and <code>ID</code> with a file id from your API.</p>

<h3>Image</h3>
<img src="https://CDN/files/ID" alt="">

<h3>PDF</h3>
<iframe src="https://CDN/files/ID" width="100%" height="500"></iframe>

<h3>Video</h3>
<video controls>
  <source src="https://CDN/files/ID" type="video/mp4">
</video>
</body></html>
