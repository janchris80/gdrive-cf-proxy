# =========================================================
# Cloudflare Worker config — GDrive File CDN v2
# =========================================================

name = "image"
main = "src/index.js"
compatibility_date = "2025-01-01"
workers_dev = true

[vars]
# --------------------------------------------------------
# MODE
#   "public" → /img/<GDRIVE_ID>  works directly (no signing)
#   "signed" → only signed fingerprints work (recommended)
# --------------------------------------------------------
MODE = "signed"

# Comma-separated domains allowed to hotlink (used only if ENABLE_HOTLINK_PROTECTION = true)
ALLOWED_REFERRERS = "kapalong.gov.ph,www.kapalong.gov.ph,localhost,127.0.0.1,facebook.com,m.facebook.com,l.facebook.com"
ENABLE_HOTLINK_PROTECTION = "false"

# Default image size if route omits one
DEFAULT_SIZE = "w1600"

# How many days to keep at the edge (max 365)
CACHE_TTL_DAYS = "7"

# Signature length in hex chars (must match Laravel CDN_SIG_LENGTH)
SIG_LENGTH = "16"

# Branding
SITE_NAME = "CDN"

# --------------------------------------------------------
#  SECRET (don't put it here — use the command below)
#
#     wrangler secret put SIGNING_SECRET
#
#  Must be identical to your Laravel CDN_SECRET.
# --------------------------------------------------------
